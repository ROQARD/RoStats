<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RoStats</title>
  <link rel="icon" href="logo.jpeg" type="image/jpeg" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
    }
    /* Full-viewport iframe */
    iframe#rostats {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Optional: hide scrollbars for some browsers */
    iframe#rostats::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <iframe
    id="rostats"
    src="https://rostats.roqard.workers.dev/"
    title="RoStats"
    allowfullscreen
    loading="eager"
    referrerpolicy="no-referrer-when-downgrade"
  >
    <!-- Fallback content if iframe is blocked -->
    <p>Your browser does not support iframes or the site blocked embedding. Open RoStats directly: <a href="https://rostats.roqard.workers.dev/" target="_blank" rel="noopener noreferrer">https://rostats.roqard.workers.dev/</a></p>
  </iframe>
</body>
</html>
